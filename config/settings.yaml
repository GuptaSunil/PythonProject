mssql:
  conn_str: "DRIVER={ODBC Driver 17 for SQL Server};SERVER=DESKTOP-VI6B10H ;DATABASE=RANDOM;UID=admin;PWD=admin"
  query: "SELECT [officename]
      ,[pincode]
      ,[officeType]
      ,[Deliverystatus]
      ,[divisionname]
      ,[regionname]
      ,[circlename]
      ,[Taluk]
      ,[Districtname]
      ,[statename]
      ,[STATE_CD] FROM [PINCODE]"

postgres:
  host: "localhost"
  dbname: "postgres"
  user: "postgres"
  password: "admin"
  port: 5432


tables:
  - source_query: "SELECT [officename],[pincode],[officeType],[Deliverystatus],[divisionname]
                  ,[regionname],[circlename],[Taluk],[Districtname],[statename],[STATE_CD] FROM [PINCODE]"
    target_table: "config.PINCODE"
    topic: "PINCODE"
    transform: "transform_Pincode"
    column_mapping:
      officename: officename
      pincode: pincode
      officeType: officetype
      Deliverystatus: deliverystatus
      divisionname: divisionname
      regionname: regionname
      circlename: circlename
      Taluk: taluk
      Districtname: districtname
      statename: statename
      STATE_CD: state_cd
    skip: true
    mode: "poll"

  - source_query: "SELECT Seq_no, State_Name, STATE_Code, GST_STATE_Code FROM STATE_Code"
    target_table: "config.STATE_Code"
    topic: "STATE_CODE"
    transform: "transform_STATE_Code"
    column_mapping:
      Seq_no: seq_no
      State_Name: state_name
      STATE_Code: state_code
      GST_STATE_Code: gst_state_code
    skip: true
    mode: "poll"

  - source_query: "SELECT UserID, UserName, LoginTime, LogoutTime, IPAddress, Device, Location, Status 
                    FROM LoginHistory"
    target_table: "config.LoginHistory"
    topic: "LOGIN_HISTORY"
    transform: "transform_LoginHistory"
    column_mapping:
      UserID: userid
      UserName: username
      LoginTime: logintime
      LogoutTime: logouttime
      IPAddress: ipaddress
      Device: device
      Location: location
      Status: status
    skip: false
    mode: "poll"

kafka:
  brokers: "127.0.0.1:9092"
  topics:
    raw_data: "raw_mssql_data"
    transformed_data: "transformed_data"
  consumer_groups:
    transform_group: "etl-transform"
    load_group: "etl-load"
  producer:
    linger_ms: 5
    batch_size: 32768
    compression_type: "snappy"